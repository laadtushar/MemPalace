<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow" x1="180" y1="120" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Hex grid pattern (subtle sci-fi texture) -->
  <g opacity="0.08" stroke="white" stroke-width="1" fill="none">
    <path d="M128,96 L168,76 L208,96 L208,136 L168,156 L128,136Z"/>
    <path d="M208,96 L248,76 L288,96 L288,136 L248,156 L208,136Z"/>
    <path d="M288,96 L328,76 L368,96 L368,136 L328,156 L288,136Z"/>
    <path d="M88,176 L128,156 L168,176 L168,216 L128,236 L88,216Z"/>
    <path d="M328,176 L368,156 L408,176 L408,216 L368,236 L328,216Z"/>
    <path d="M88,336 L128,316 L168,336 L168,376 L128,396 L88,376Z"/>
    <path d="M328,336 L368,316 L408,336 L408,376 L368,396 L328,376Z"/>
    <path d="M128,416 L168,396 L208,416 L208,456 L168,476 L128,456Z"/>
    <path d="M288,416 L328,396 L368,416 L368,456 L328,476 L288,456Z"/>
  </g>

  <!-- Orbital rings -->
  <ellipse cx="256" cy="260" rx="155" ry="55" stroke="url(#glow)" stroke-width="1.5" opacity="0.2" fill="none" transform="rotate(-30,256,260)"/>
  <ellipse cx="256" cy="260" rx="155" ry="55" stroke="url(#glow)" stroke-width="1.5" opacity="0.2" fill="none" transform="rotate(30,256,260)"/>
  <ellipse cx="256" cy="260" rx="155" ry="55" stroke="url(#glow)" stroke-width="1.5" opacity="0.15" fill="none" transform="rotate(90,256,260)"/>

  <!-- Neural connections (glowing lines) -->
  <g filter="url(#line-glow)">
    <!-- Core to outer nodes -->
    <line x1="256" y1="248" x2="176" y2="176" stroke="white" stroke-width="2.5" opacity="0.6"/>
    <line x1="256" y1="248" x2="344" y2="176" stroke="white" stroke-width="2.5" opacity="0.6"/>
    <line x1="256" y1="272" x2="152" y2="320" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="256" y1="272" x2="360" y2="320" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="256" y1="284" x2="216" y2="384" stroke="white" stroke-width="2" opacity="0.45"/>
    <line x1="256" y1="284" x2="296" y2="384" stroke="white" stroke-width="2" opacity="0.45"/>
    <line x1="256" y1="232" x2="256" y2="144" stroke="white" stroke-width="2.5" opacity="0.55"/>
    <!-- Cross connections -->
    <line x1="176" y1="176" x2="152" y2="320" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="344" y1="176" x2="360" y2="320" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="176" y1="176" x2="256" y2="144" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <line x1="344" y1="176" x2="256" y2="144" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <line x1="216" y1="384" x2="296" y2="384" stroke="white" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Nodes (glowing) -->
  <g filter="url(#node-glow)">
    <!-- Center (largest, primary) -->
    <circle cx="256" cy="260" r="32" fill="white"/>
    <!-- Top -->
    <circle cx="256" cy="144" r="16" fill="white" opacity="0.9"/>
    <!-- Upper left -->
    <circle cx="176" cy="176" r="14" fill="white" opacity="0.85"/>
    <!-- Upper right -->
    <circle cx="344" cy="176" r="14" fill="white" opacity="0.85"/>
    <!-- Mid left -->
    <circle cx="152" cy="320" r="12" fill="white" opacity="0.75"/>
    <!-- Mid right -->
    <circle cx="360" cy="320" r="12" fill="white" opacity="0.75"/>
    <!-- Bottom left -->
    <circle cx="216" cy="384" r="11" fill="white" opacity="0.7"/>
    <!-- Bottom right -->
    <circle cx="296" cy="384" r="11" fill="white" opacity="0.7"/>
  </g>

  <!-- Pulsing ring around center -->
  <circle cx="256" cy="260" r="44" stroke="white" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="256" cy="260" r="56" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>

  <!-- M lettermark in center -->
  <text x="256" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="34" fill="#4f46e5">M</text>
</svg>
