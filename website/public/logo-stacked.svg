<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="sbg" x1="40" y1="0" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="sng">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon centered -->
  <rect x="30" y="0" width="140" height="140" rx="30" fill="url(#sbg)"/>
  <ellipse cx="100" cy="72" rx="42" ry="15" stroke="white" stroke-width="0.8" opacity="0.15" fill="none" transform="rotate(-30,100,72)"/>
  <ellipse cx="100" cy="72" rx="42" ry="15" stroke="white" stroke-width="0.8" opacity="0.15" fill="none" transform="rotate(30,100,72)"/>
  <line x1="100" y1="68" x2="78" y2="48" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="68" x2="122" y2="48" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="76" x2="74" y2="88" stroke="white" stroke-width="1.3" opacity="0.4"/>
  <line x1="100" y1="76" x2="126" y2="88" stroke="white" stroke-width="1.3" opacity="0.4"/>
  <line x1="100" y1="80" x2="88" y2="108" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="100" y1="80" x2="112" y2="108" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="100" y1="64" x2="100" y2="36" stroke="white" stroke-width="1.5" opacity="0.45"/>
  <g filter="url(#sng)">
    <circle cx="100" cy="72" r="9" fill="white"/>
    <circle cx="100" cy="36" r="5" fill="white" opacity="0.85"/>
    <circle cx="78" cy="48" r="4.5" fill="white" opacity="0.8"/>
    <circle cx="122" cy="48" r="4.5" fill="white" opacity="0.8"/>
    <circle cx="74" cy="88" r="4" fill="white" opacity="0.7"/>
    <circle cx="126" cy="88" r="4" fill="white" opacity="0.7"/>
    <circle cx="88" cy="108" r="3.5" fill="white" opacity="0.65"/>
    <circle cx="112" cy="108" r="3.5" fill="white" opacity="0.65"/>
  </g>
  <circle cx="100" cy="72" r="12.5" stroke="white" stroke-width="0.7" fill="none" opacity="0.15"/>
  <text x="100" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="10" fill="#4f46e5">M</text>
  <!-- Wordmark below -->
  <text x="100" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="32" letter-spacing="-0.5">
    <tspan fill="white">Memry</tspan><tspan fill="#a78bfa">Lab</tspan>
  </text>
  <text x="100" y="204" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="400" font-size="11" fill="#94a3b8" letter-spacing="3">YOUR MEMORY, VISUALIZED</text>
</svg>
