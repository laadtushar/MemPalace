<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <linearGradient id="hdbg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="hdng">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon (same as horizontal) -->
  <rect width="72" height="72" rx="16" fill="url(#hdbg)"/>
  <ellipse cx="36" cy="37" rx="22" ry="8" stroke="white" stroke-width="0.6" opacity="0.15" fill="none" transform="rotate(-30,36,37)"/>
  <ellipse cx="36" cy="37" rx="22" ry="8" stroke="white" stroke-width="0.6" opacity="0.15" fill="none" transform="rotate(30,36,37)"/>
  <line x1="36" y1="35" x2="22" y2="24" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="35" x2="50" y2="24" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="39" x2="20" y2="46" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="39" x2="52" y2="46" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="42" x2="30" y2="56" stroke="white" stroke-width="1" opacity="0.35"/>
  <line x1="36" y1="42" x2="42" y2="56" stroke="white" stroke-width="1" opacity="0.35"/>
  <line x1="36" y1="32" x2="36" y2="18" stroke="white" stroke-width="1.2" opacity="0.45"/>
  <g filter="url(#hdng)">
    <circle cx="36" cy="37" r="5" fill="white"/>
    <circle cx="36" cy="18" r="2.8" fill="white" opacity="0.85"/>
    <circle cx="22" cy="24" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="50" cy="24" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="20" cy="46" r="2.2" fill="white" opacity="0.7"/>
    <circle cx="52" cy="46" r="2.2" fill="white" opacity="0.7"/>
    <circle cx="30" cy="56" r="2" fill="white" opacity="0.65"/>
    <circle cx="42" cy="56" r="2" fill="white" opacity="0.65"/>
  </g>
  <circle cx="36" cy="37" r="7" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
  <text x="36" y="39.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="5.5" fill="#4f46e5">M</text>
  <!-- Wordmark (dark text for light bg) -->
  <text x="88" y="46" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
    <tspan fill="#0f172a">Memry</tspan><tspan fill="#6d28d9">Lab</tspan>
  </text>
</svg>
